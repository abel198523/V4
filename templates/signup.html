<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Royal Bingo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            background-color: #0b0e14;
            color: #ffffff;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        .navbar {
            background-color: #161b22;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            height: 60px;
        }
        .card {
            background-color: #1a1f29;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .form-input {
            background-color: #0d1117;
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff;
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            transition: all 0.3s;
        }
        .form-input:focus {
            border-color: #0d6efd;
            background-color: #161b22;
            box-shadow: 0 0 0 4px rgba(13,110,253,0.15);
            outline: none;
            color: #ffffff;
        }
        .btn-signup {
            background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            color: #fff;
            transition: all 0.3s;
        }
        .btn-signup:hover { opacity: 0.9; }
        .btn-signup:disabled { opacity: 0.6; cursor: not-allowed; }
        .text-muted { color: #a0aab8 !important; }
        .label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; color: #a0aab8; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .animate-in { animation: fadeInUp 0.5s cubic-bezier(0.4,0,0.2,1); }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #error-msg { min-height: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid px-3 h-100 d-flex align-items-center">
            <a class="navbar-brand fw-bold" href="/">ROYAL BINGO</a>
            <div class="ms-auto d-flex gap-2">
                <a href="{{ url_for('login') }}" class="btn btn-outline-light btn-sm">Login</a>
                <a href="{{ url_for('signup') }}" class="btn btn-primary btn-sm">Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 60px); padding: 20px;">
        <div class="card p-4 animate-in w-100" style="max-width: 400px;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-white mb-1">Join the Club</h2>
                <p class="text-muted small mb-0">Create your account to start playing</p>
            </div>

            <div class="mb-3">
                <label class="label">Username</label>
                <input type="text" id="username" class="form-input" placeholder="Choose a username" autocomplete="off">
            </div>
            <div class="mb-4">
                <label class="label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="At least 6 characters">
            </div>

            <button class="btn-signup" id="signup-btn" onclick="doSignup()">Create Account</button>

            <div id="error-msg" class="text-danger mt-3 text-center small fw-bold"></div>

            <div class="text-center mt-4">
                <p class="text-muted small mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-primary text-decoration-none fw-bold">Login</a></p>
            </div>
        </div>
    </div>

    <script>
    async function doSignup() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('signup-btn');
        const errorMsg = document.getElementById('error-msg');

        errorMsg.innerText = '';

        if (!username || !password) {
            errorMsg.innerText = 'Please fill in all fields.';
            return;
        }
        if (password.length < 6) {
            errorMsg.innerText = 'Password must be at least 6 characters.';
            return;
        }

        btn.disabled = true;
        btn.innerText = 'Creating account...';

        try {
            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = '/game';
            } else {
                errorMsg.innerText = data.message || 'Registration failed.';
                btn.disabled = false;
                btn.innerText = 'Create Account';
            }
        } catch (e) {
            errorMsg.innerText = 'Connection error. Please try again.';
            btn.disabled = false;
            btn.innerText = 'Create Account';
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doSignup();
    });
    </script>
</body>
</html>
