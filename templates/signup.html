<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Nova Bingo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        html, body {
            background-color: #0b0e14;
            color: #ffffff;
            min-height: 100vh;
            margin: 0; padding: 0;
        }
        .navbar {
            background-color: #161b22;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            height: 60px;
        }
        .card {
            background-color: #1a1f29;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .btn-tg {
            background: linear-gradient(135deg,#229ED9 0%,#1a8bc4 100%);
            border: none; border-radius: 12px; padding: 16px 20px;
            font-weight: 700; font-size: 1.05rem; color: #fff;
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; transition: opacity 0.2s;
        }
        .btn-tg:hover { opacity: 0.9; color: #fff; }
        .text-muted { color: #a0aab8 !important; }
        .animate-in { animation: fadeInUp 0.5s cubic-bezier(0.4,0,0.2,1); }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .step-row { display:flex; align-items:center; gap:12px; padding: 10px 0; }
        .step-num { font-size:1.3rem; flex-shrink:0; }
        .step-text { font-size:0.88rem; color:#cbd5e1; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid px-3 h-100 d-flex align-items-center">
            <a class="navbar-brand fw-bold" href="/">NOVA BINGO</a>
        </div>
    </nav>

    <div class="d-flex justify-content-center align-items-center" style="min-height:calc(100vh - 60px);padding:20px;">
        <div class="card p-4 animate-in w-100" style="max-width:400px;">
            <div class="text-center mb-4">
                <div style="font-size:2.5rem;margin-bottom:8px;">🎮</div>
                <h2 class="fw-bold text-white mb-1">ወደ NOVA BINGO ይቀላቀሉ</h2>
                <p class="text-muted small mb-0">ምዝገባ በቴሌግራም ብቻ ነው</p>
            </div>

            {% if ref_code %}
            <div class="mb-4 p-3" style="background:#0d2218;border:1px solid #22c55e;border-radius:12px;display:flex;align-items:center;gap:10px;">
                <span style="font-size:1.4rem;">🎁</span>
                <div>
                    <div style="color:#4ade80;font-weight:700;font-size:0.9rem;">ተጋብዘዋል!</div>
                    <div style="color:#86efac;font-size:0.78rem;margin-top:2px;">ሲመዘገቡ ሁለታችሁም bonus ትቀበላላችሁ።</div>
                </div>
            </div>
            {% endif %}

            {% if bot_username %}
            <a href="https://t.me/{{ bot_username }}{% if ref_code %}?start={{ ref_code }}{% endif %}"
               target="_blank" class="btn-tg mb-4">
                <i class="bi bi-telegram fs-4"></i>
                ቦቱ ላይ ይመዝገቡ
            </a>
            {% endif %}

            <div style="background:#0d1117;border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,0.06);">
                <div style="font-size:0.72rem;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;">እንዴት ይሰራል?</div>
                <div class="step-row">
                    <span class="step-num">1️⃣</span>
                    <span class="step-text">ቦቱን ክፈቱ → <strong style="color:#38bdf8;">/start</strong> ይጫኑ</span>
                </div>
                <div class="step-row">
                    <span class="step-num">2️⃣</span>
                    <span class="step-text"><strong>Share My Contact</strong> ቁልፍ ይጫኑ</span>
                </div>
                <div class="step-row">
                    <span class="step-num">3️⃣</span>
                    <span class="step-text">ቦቱ ሊንክ ይልካልዎ → ወዲያው ጨዋታ ይጀምሩ 🎉</span>
                </div>
            </div>

            <div class="text-center mt-4">
                <p class="text-muted small mb-0">
                    አካውንት አለዎ?
                    <a href="{{ url_for('login') }}" class="text-primary text-decoration-none fw-bold">Login</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
