<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nova Bingo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        html, body {
            background-color: #0b0e14 !important;
            color: #ffffff !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            display: flex !important;
            flex-direction: column !important;
            overflow: hidden !important;
            position: fixed !important;
            inset: 0 !important;
        }
        .navbar {
            flex: 0 0 auto;
            background-color: #161b22 !important;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            height: 60px;
            z-index: 1000;
        }
        .content-wrapper {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background-color: #1a1f29;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .form-input {
            background-color: #0d1117;
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.3s;
            width: 100%;
        }
        .form-input:focus {
            border-color: #0d6efd;
            background-color: #161b22;
            box-shadow: 0 0 0 4px rgba(13,110,253,0.15);
            outline: none;
            color: #ffffff;
        }
        .btn { border-radius: 12px; padding: 12px 20px; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg,#0d6efd 0%,#0b5ed7 100%); border: none; }
        .btn-tg {
            background: linear-gradient(135deg,#229ED9 0%,#1a8bc4 100%);
            border: none; border-radius: 12px; padding: 14px 20px;
            font-weight: 700; font-size: 1rem; color: #fff;
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; transition: opacity 0.2s;
        }
        .btn-tg:hover { opacity: 0.9; color: #fff; }
        .text-muted { color: #a0aab8 !important; }
        .divider { display:flex; align-items:center; gap:10px; margin: 16px 0; }
        .divider-line { flex:1; height:1px; background:rgba(255,255,255,0.08); }
        .divider-text { font-size:0.72rem; color:#64748b; font-weight:600; white-space:nowrap; }
        .animate-in { animation: fadeInUp 0.6s cubic-bezier(0.4,0,0.2,1); }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%,90% { transform:translate3d(-1px,0,0); }
            20%,80% { transform:translate3d(2px,0,0); }
            30%,50%,70% { transform:translate3d(-4px,0,0); }
            40%,60% { transform:translate3d(4px,0,0); }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid px-3 h-100 d-flex align-items-center">
            <a class="navbar-brand fw-bold" href="/">NOVA BINGO</a>
        </div>
    </nav>
    <div class="content-wrapper">
        <div class="card p-4 w-100 animate-in" style="max-width:400px;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-white mb-1">ወደ ጨዋታ ይግቡ</h2>
                <p class="text-muted small">Welcome Back</p>
            </div>

            {% if bot_username %}
            <a href="https://t.me/{{ bot_username }}" target="_blank" class="btn-tg mb-2">
                <i class="bi bi-telegram fs-5"></i>
                ቦቱ ላይ /login ይጫኑ
            </a>
            <div class="text-center mb-2" style="font-size:0.78rem;color:#64748b;">
                ቦቱ ላይ <strong>/login</strong> ጽፈው ሊንኩን ይቀበሉ
            </div>
            {% endif %}

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">ወይም በ Password</span>
                <div class="divider-line"></div>
            </div>

            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="e.g. king_bingo" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted text-uppercase">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3">Login</button>
            </form>

            <div id="error-msg" class="text-danger mt-3 text-center small fw-bold"></div>

            <div class="text-center mt-4">
                <p class="text-muted small mb-0">
                    አካውንት የለዎትም?
                    {% if bot_username %}
                    <a href="https://t.me/{{ bot_username }}" target="_blank" class="text-primary text-decoration-none fw-bold">ቦቱ ላይ ይመዝገቡ</a>
                    {% else %}
                    <a href="/" class="text-primary text-decoration-none fw-bold">ለመመዝገብ</a>
                    {% endif %}
                </p>
            </div>
        </div>
    </div>

<script>
const loginForm = document.getElementById('login-form');
const loginBtn = loginForm.querySelector('button[type="submit"]');
const errorMsg = document.getElementById('error-msg');

loginForm.onsubmit = async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    errorMsg.innerText = "";
    loginBtn.disabled = true;
    const orig = loginBtn.innerHTML;
    loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
    try {
        const r = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, password })
        });
        const data = await r.json();
        if (data.success) {
            window.location.href = '/game';
        } else {
            errorMsg.innerText = data.message || "Invalid username or password";
            loginForm.classList.add('shake');
            setTimeout(() => loginForm.classList.remove('shake'), 500);
        }
    } catch(e) {
        errorMsg.innerText = "Connection error. Please try again.";
    } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = orig;
    }
};
</script>
</body>
</html>
