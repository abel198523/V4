<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Expired - Nova Bingo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        html, body {
            background-color: #0b0e14;
            color: #ffffff;
            min-height: 100vh;
            margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .card {
            background-color: #1a1f29;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            max-width: 380px; width: 100%; padding: 36px 28px;
            text-align: center;
        }
        .btn-tg {
            background: linear-gradient(135deg,#229ED9 0%,#1a8bc4 100%);
            border: none; border-radius: 12px; padding: 14px 20px;
            font-weight: 700; font-size: 1rem; color: #fff;
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; transition: opacity 0.2s; margin-top: 20px;
        }
        .btn-tg:hover { opacity:0.9; color:#fff; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size:3rem;margin-bottom:16px;">⏰</div>
        <h3 class="fw-bold mb-2">ሊንኩ ጊዜው አልፏል</h3>
        <p style="color:#a0aab8;font-size:0.9rem;line-height:1.6;">
            የመግቢያ ሊንኩ ጊዜው አልፏል ወይም ቀድሞ ጥቅም ላይ ውሏል።<br>
            አዲስ ሊንክ ለማግኘት ቦቱ ላይ <strong>/login</strong> ይጫኑ።
        </p>
        {% if bot_username %}
        <a href="https://t.me/{{ bot_username }}" target="_blank" class="btn-tg">
            <i class="bi bi-telegram fs-5"></i>
            ቦቱ ላይ /login ይጫኑ
        </a>
        {% else %}
        <a href="/" class="btn-tg">
            <i class="bi bi-house fs-5"></i>
            ወደ መነሻ ይሂዱ
        </a>
        {% endif %}
    </div>
</body>
</html>
